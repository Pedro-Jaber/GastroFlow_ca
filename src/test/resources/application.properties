spring.application.name=gastoflow_ca_test

spring.datasource.url=jdbc:h2:mem:gastoflow_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

jwt.secret=test-jwt-secret-key-with-at-least-32-characters
jwt.expiration-ms=3600000

admin.name=Administrador
admin.email=admin@gastoflow.com
admin.password=admin123
